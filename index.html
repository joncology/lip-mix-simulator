<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>립 베이스 3색 혼합 시뮬레이터</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", system-ui, sans-serif;
    color: #1c1c1f; background: #ffffff;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .card { width: 100%; max-width: 980px; }
  .head { text-align: center; margin-bottom: 14px; }
  .head h1 { font-size: 19px; margin: 0 0 4px; letter-spacing: -0.02em; }
  .head p { font-size: 12px; color: #7a7a82; margin: 0; }

  .toggle { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin: 12px 0 18px; }
  .toggle button {
    font: 600 11.5px system-ui, sans-serif; cursor: pointer;
    padding: 8px 14px; border-radius: 999px; border: 1px solid rgba(0,0,0,.12);
    background: #f2efed; color: #555; transition: all .15s;
  }
  .toggle button.on { background: #1c1c1f; color: #fff; border-color: #1c1c1f; }

  .demo-wrap { display: flex; gap: 40px; align-items: center; justify-content: center; flex-wrap: wrap; }
  #triCanvas {
    touch-action: none; cursor: crosshair; border-radius: 14px;
    box-shadow: 0 10px 34px rgba(0,0,0,.14); background: #faf8f7;
    width: 100%; max-width: 460px; height: auto; aspect-ratio: 540 / 500;
  }
  .panel { width: 300px; }
  .setname { font-size: 12px; color: #7a7a82; margin: 0 0 8px; font-weight: 600; }
  .swatch { width: 100%; height: 100px; border-radius: 12px; border: 1px solid rgba(0,0,0,.12);
            box-shadow: inset 0 1px 2px rgba(0,0,0,.08); }
  .hex { font: 600 19px/1 ui-monospace, SFMono-Regular, Menlo, monospace;
         margin: 12px 0 14px; letter-spacing: .04em; }
  .ratio-row { display: flex; align-items: center; gap: 10px; margin: 9px 0; }
  .ratio-row .dot { width: 15px; height: 15px; border-radius: 4px; flex: 0 0 auto; border: 1px solid rgba(0,0,0,.12); }
  .ratio-row .name { width: 134px; color: #7a7a82; font-size: 11px; line-height: 1.3; }
  .bar { flex: 1; height: 10px; border-radius: 6px; background: rgba(0,0,0,.07); overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 6px; }
  .ratio-row .pct { width: 44px; text-align: right; font: 600 12px ui-monospace, monospace; }
  .hint { color: #7a7a82; font-size: 11px; margin-top: 16px; line-height: 1.7; }
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <h1>립 베이스 3색 혼합 시뮬레이터</h1>
    <p>삼각형 안을 클릭·드래그하면 혼합 비율과 결과 색이 실시간으로 바뀝니다</p>
  </div>

  <div class="toggle">
    <button data-key="REC" class="on">⭐ 추천</button>
    <button data-key="REC2">추천 변형(밝은)</button>
    <button data-key="A">123 세트</button>
    <button data-key="B">456 세트</button>
  </div>

  <div class="demo-wrap">
    <canvas id="triCanvas" width="540" height="500"></canvas>
    <div class="panel">
      <p class="setname" id="setname"></p>
      <div class="swatch" id="swatch"></div>
      <div class="hex" id="hex">#000000</div>

      <div class="ratio-row">
        <span class="dot" id="dot1"></span><span class="name" id="name1"></span>
        <span class="bar"><i id="bar1"></i></span><span class="pct" id="pct1">33%</span>
      </div>
      <div class="ratio-row">
        <span class="dot" id="dot2"></span><span class="name" id="name2"></span>
        <span class="bar"><i id="bar2"></i></span><span class="pct" id="pct2">33%</span>
      </div>
      <div class="ratio-row">
        <span class="dot" id="dot3"></span><span class="name" id="name3"></span>
        <span class="bar"><i id="bar3"></i></span><span class="pct" id="pct3">33%</span>
      </div>

      <div class="hint">
        비율 = 섞는 <b>분량(parts)</b> 기준. 꼭짓점에 가까울수록 그 베이스 비중↑.<br />
        * 흡광 가산(감산) 모델 기반 <b>예측치</b> — 실제 안료 발색력 차이는 보정 필요.
      </div>
    </div>
  </div>
</div>

<script>
  // ===== 색 사전: XYZ(0~100) 측정값 =====
  const COL = {
    rosy:  { hex: '#ae5a52', name: '로지 클레이',   XYZ: [22.808, 17.063, 10.107] },
    vivid: { hex: '#bd161d', name: '비비드 레드',   XYZ: [21.575, 11.526, 2.288] },
    plum:  { hex: '#6e2d3d', name: '딥 플럼',       XYZ: [8.329, 5.633, 5.079] },
    blood: { hex: '#840000', name: '딥 레드(블러드)', XYZ: [9.331, 4.484, 0.107] },
    brick: { hex: '#a96349', name: '브릭 누드',     XYZ: [22.078, 17.908, 8.638] },
    burg:  { hex: '#541228', name: '다크 버건디',   XYZ: [4.315, 2.51, 2.312] },
  };
  // 슬롯: 위=②(채도/메인), 좌하=①(밝은 누드), 우하=③(딥)
  const PALETTES = {
    REC:  { label: '⭐ 추천 · 누드+레드+버건디', top: 'vivid', left: 'brick', right: 'burg' },
    REC2: { label: '추천 변형 · 다크를 플럼으로(밝음)', top: 'vivid', left: 'brick', right: 'plum' },
    A:    { label: '123 세트', top: 'vivid', left: 'rosy', right: 'plum' },
    B:    { label: '456 세트', top: 'brick', left: 'blood', right: 'burg' },
  };

  function xyzToLinear([X, Y, Z]) {
    X /= 100; Y /= 100; Z /= 100;
    return [
      3.2406 * X - 1.5372 * Y - 0.4986 * Z,
      -0.9689 * X + 1.8758 * Y + 0.0415 * Z,
      0.0557 * X - 0.2040 * Y + 1.0570 * Z,
    ].map(c => Math.min(1, Math.max(1e-6, c)));
  }
  const linToSrgb = c => { c = Math.min(1, Math.max(0, c)); return c <= 0.0031308 ? 12.92 * c : 1.055 * Math.pow(c, 1 / 2.4) - 0.055; };
  const toHex = ([r, g, b]) => '#' + [r, g, b].map(n => n.toString(16).padStart(2, '0')).join('');

  const canvas = document.getElementById('triCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const POS = { top: { x: 270, y: 54 }, left: { x: 54, y: 446 }, right: { x: 486, y: 446 } };
  const A = POS.top, B = POS.left, C = POS.right;
  const v0x = B.x - A.x, v0y = B.y - A.y, v1x = C.x - A.x, v1y = C.y - A.y;
  const d00 = v0x * v0x + v0y * v0y, d01 = v0x * v1x + v0y * v1y, d11 = v1x * v1x + v1y * v1y;
  const denom = d00 * d11 - d01 * d01;
  function bary(px, py) {
    const v2x = px - A.x, v2y = py - A.y;
    const d20 = v2x * v0x + v2y * v0y, d21 = v2x * v1x + v2y * v1y;
    const v = (d11 * d20 - d01 * d21) / denom, w = (d00 * d21 - d01 * d20) / denom;
    return [1 - v - w, v, w]; // [top, left, right]
  }

  // 현재 팔레트 상태
  let LIN = [];        // [top, left, right] 선형광
  let TAGS = ['②', '①', '③'];
  const triImg = ctx.createImageData(W, H);
  let handle = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };

  function mixRGB(w) { // w=[top,left,right]
    const out = [0, 0, 0];
    for (let k = 0; k < 3; k++)
      out[k] = Math.pow(LIN[0][k], w[0]) * Math.pow(LIN[1][k], w[1]) * Math.pow(LIN[2][k], w[2]);
    return out.map(c => Math.round(linToSrgb(c) * 255));
  }
  function paintTriangle() {
    const d = triImg.data;
    for (let y = 0; y < H; y++) for (let x = 0; x < W; x++) {
      const [u, v, w] = bary(x + 0.5, y + 0.5);
      const i = (y * W + x) * 4;
      if (u >= -0.002 && v >= -0.002 && w >= -0.002) {
        const [r, g, b] = mixRGB([Math.max(0, u), Math.max(0, v), Math.max(0, w)]);
        d[i] = r; d[i + 1] = g; d[i + 2] = b; d[i + 3] = 255;
      } else d[i + 3] = 0;
    }
  }
  function clampInside(px, py) {
    let [u, v, w] = bary(px, py);
    u = Math.max(0, u); v = Math.max(0, v); w = Math.max(0, w);
    const s = u + v + w || 1; u /= s; v /= s; w /= s;
    return { x: u * A.x + v * B.x + w * C.x, y: u * A.y + v * B.y + w * C.y, u, v, w };
  }

  const $ = id => document.getElementById(id);
  const panel = {
    setname: $('setname'), swatch: $('swatch'), hex: $('hex'),
    rows: [
      { dot: $('dot1'), name: $('name1'), bar: $('bar1'), pct: $('pct1') },
      { dot: $('dot2'), name: $('name2'), bar: $('bar2'), pct: $('pct2') },
      { dot: $('dot3'), name: $('name3'), bar: $('bar3'), pct: $('pct3') },
    ],
  };

  function render() {
    ctx.clearRect(0, 0, W, H);
    ctx.putImageData(triImg, 0, 0);
    ctx.font = '600 25px ui-monospace, monospace';
    ctx.fillStyle = '#333'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(TAGS[0], A.x, A.y - 28);          // top ②
    ctx.fillText(TAGS[1], B.x - 28, B.y + 14);     // left ①
    ctx.fillText(TAGS[2], C.x + 28, C.y + 14);     // right ③

    const { u, v, w } = clampInside(handle.x, handle.y);
    const rgb = mixRGB([u, v, w]);
    ctx.beginPath(); ctx.arc(handle.x, handle.y, 13, 0, Math.PI * 2);
    ctx.fillStyle = toHex(rgb); ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = '#fff'; ctx.stroke();
    ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(0,0,0,.4)';
    ctx.beginPath(); ctx.arc(handle.x, handle.y, 14.5, 0, Math.PI * 2); ctx.stroke();

    const hex = toHex(rgb);
    panel.swatch.style.background = hex;
    panel.hex.textContent = hex.toUpperCase();
    // 패널 ①②③ = [left(v), top(u), right(w)]
    const vals = [v, u, w];
    panel.rows.forEach((r, i) => {
      r.bar.style.width = (vals[i] * 100).toFixed(1) + '%';
      r.pct.textContent = Math.round(vals[i] * 100) + '%';
    });
  }

  function applyPalette(key) {
    const P = PALETTES[key];
    const top = COL[P.top], left = COL[P.left], right = COL[P.right];
    LIN = [top, left, right].map(c => xyzToLinear(c.XYZ));
    paintTriangle();
    handle = { x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 };

    panel.setname.textContent = P.label;
    // 패널 행: ①=left, ②=top, ③=right
    const order = [left, top, right];
    const tagByRow = ['①', '②', '③'];
    panel.rows.forEach((r, i) => {
      r.dot.style.background = order[i].hex;
      r.bar.style.background = order[i].hex;
      r.name.innerHTML = tagByRow[i] + ' ' + order[i].name + '<br>' + order[i].hex;
    });
    document.querySelectorAll('.toggle button').forEach(b => b.classList.toggle('on', b.dataset.key === key));
    render();
  }

  let dragging = false;
  function setFromEvent(e) {
    const r = canvas.getBoundingClientRect();
    const p = clampInside((e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height));
    handle.x = p.x; handle.y = p.y; render();
  }
  canvas.addEventListener('pointerdown', e => { dragging = true; canvas.setPointerCapture(e.pointerId); setFromEvent(e); });
  canvas.addEventListener('pointermove', e => { if (dragging) setFromEvent(e); });
  canvas.addEventListener('pointerup', () => { dragging = false; });
  document.querySelectorAll('.toggle button').forEach(b => b.addEventListener('click', () => applyPalette(b.dataset.key)));

  applyPalette('REC');
</script>
</body>
</html>
